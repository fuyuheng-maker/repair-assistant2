<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>设备检修知识助手</title>
    <style>
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .entry-card { background: white; padding: 50px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); text-align: center; width: 400px; }
        h1 { color: #1a73e8; margin-bottom: 40px; }
        .role-btn { display: block; width: 100%; padding: 18px; margin: 15px 0; border: none; border-radius: 10px; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .btn-worker { background: #1a73e8; color: white; }
        .btn-worker:hover { background: #1557b0; }
        .btn-reviewer { background: #f57c00; color: white; }
        .btn-reviewer:hover { background: #e65100; }
        p { margin-top: 30px; color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <div class="entry-card">
        <h1>🔧 设备检修知识助手</h1>
        <button class="role-btn btn-worker" onclick="location.href='/login'">🔩 操作员登录</button>
        <button class="role-btn btn-reviewer" onclick="location.href='/reviewer_login'">🔍 审核员登录</button>
        <p>请选择您的角色进入系统</p>
    </div>
</body>
</html>
