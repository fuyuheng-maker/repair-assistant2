<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>设备检修知识助手 - 登录</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 420px; }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 25px; }
        .tab-buttons { display: flex; margin-bottom: 25px; border-radius: 8px; overflow: hidden; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #e0e0e0; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .tab-btn.active { color: white; }
        .tab-btn:first-child.active { background: #1a73e8; }
        .tab-btn:last-child.active { background: #f57c00; }
        .form-panel { display: none; }
        .form-panel.active { display: block; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .btn-submit { width: 100%; padding: 12px; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 5px; }
        .btn-worker { background: #1a73e8; }
        .btn-worker:hover { background: #1557b0; }
        .btn-reviewer { background: #f57c00; }
        .btn-reviewer:hover { background: #e65100; }
        .error { color: red; font-size: 14px; margin-bottom: 10px; text-align: center; }
        .note { font-size: 0.8em; color: #888; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>🔧 设备检修知识助手</h2>
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('worker')">🔩 操作员登录</button>
            <button class="tab-btn" onclick="switchTab('reviewer')">🔍 审核员登录</button>
        </div>

        <!-- 操作员登录表单 -->
        <div id="worker-panel" class="form-panel active">
            <form onsubmit="workerLogin(event)">
                <input type="text" id="worker-username" placeholder="用户名" required autocomplete="off">
                <input type="password" id="worker-password" placeholder="密码" required>
                <div class="error" id="worker-error"></div>
                <button type="submit" class="btn-submit btn-worker">登 录</button>
            </form>
            <div class="note">操作员可进行检修知识查询与经验提交</div>
        </div>

        <!-- 审核员登录表单 -->
        <div id="reviewer-panel" class="form-panel">
            <form onsubmit="reviewerLogin(event)">
                <input type="text" id="reviewer-username" placeholder="审核员账号（admin）" required autocomplete="off">
                <input type="password" id="reviewer-password" placeholder="密码" required>
                <div class="error" id="reviewer-error"></div>
                <button type="submit" class="btn-submit btn-reviewer">登 录</button>
            </form>
            <div class="note">仅限审核员账号登录，进行案例与修正审核</div>
        </div>
    </div>

    <script>
        function switchTab(role) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
            if (role === 'worker') {
                document.querySelector('.tab-btn:first-child').classList.add('active');
                document.getElementById('worker-panel').classList.add('active');
            } else {
                document.querySelector('.tab-btn:last-child').classList.add('active');
                document.getElementById('reviewer-panel').classList.add('active');
            }
        }

        async function workerLogin(e) {
            e.preventDefault();
            const username = document.getElementById('worker-username').value;
            const password = document.getElementById('worker-password').value;
            const errorEl = document.getElementById('worker-error');
            errorEl.textContent = '';
            const formData = new FormData();
            formData.append('username', username);
            formData.append('password', password);
            try {
                const res = await fetch('/api/login', { method: 'POST', body: formData });
                const data = await res.json();
                if (!res.ok) {
                    errorEl.textContent = data.detail || '登录失败';
                    return;
                }
                localStorage.setItem('token', data.access_token);
                localStorage.setItem('role', data.role);
                window.location.href = '/';
            } catch (err) {
                errorEl.textContent = '网络错误';
            }
        }

        async function reviewerLogin(e) {
            e.preventDefault();
            const username = document.getElementById('reviewer-username').value;
            const password = document.getElementById('reviewer-password').value;
            const errorEl = document.getElementById('reviewer-error');
            errorEl.textContent = '';
            const formData = new FormData();
            formData.append('username', username);
            formData.append('password', password);
            try {
                const res = await fetch('/api/reviewer/login', { method: 'POST', body: formData });
                const data = await res.json();
                if (!res.ok) {
                    errorEl.textContent = data.detail || '登录失败';
                    return;
                }
                localStorage.setItem('token', data.access_token);
                localStorage.setItem('role', 'admin');
                window.location.href = '/static/admin.html';
            } catch (err) {
                errorEl.textContent = '网络错误';
            }
        }
    </script>
</body>
</html>
