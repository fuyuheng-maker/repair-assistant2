<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>认证诊断</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        h1 { color: #333; }
        .info { background: #e3f2fd; padding: 15px; border-radius: 5px; margin: 10px 0; }
        .error { background: #ffebee; padding: 15px; border-radius: 5px; margin: 10px 0; color: #c62828; }
        .success { background: #e8f5e9; padding: 15px; border-radius: 5px; margin: 10px 0; color: #2e7d32; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 5px; overflow-x: auto; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 认证诊断工具</h1>

        <div id="status"></div>

        <button onclick="testAuth()">测试认证</button>
        <button onclick="testDownload()">测试下载API</button>
        <button onclick="testDelete()">测试删除API</button>
        <button onclick="clearAndReLogin()">清除缓存重新登录</button>

        <div id="result" style="margin-top: 20px;"></div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const username = localStorage.getItem('username');

        function showStatus(msg, type) {
            document.getElementById('status').innerHTML = `<div class="${type}">${msg}</div>`;
        }

        function showResult(title, data) {
            document.getElementById('result').innerHTML = `
                <h3>${title}</h3>
                <pre>${JSON.stringify(data, null, 2)}</pre>
            `;
        }

        function testAuth() {
            if (!token) {
                showStatus('❌ 未登录', 'error');
                return;
            }

            showStatus(`✓ 已登录 - 用户: ${username}`, 'success');

            // 解析token
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                showResult('Token Payload', {
                    sub: payload.sub,
                    role: payload.role,
                    exp: new Date(payload.exp * 1000).toLocaleString(),
                    iat: new Date(payload.iat * 1000).toLocaleString()
                });
            } catch (e) {
                showResult('Token解析失败', { error: e.message });
            }
        }

        async function testDownload() {
            if (!token) {
                showStatus('❌ 未登录', 'error');
                return;
            }

            showStatus('正在测试下载API...', 'info');

            // 先获取文件列表
            try {
                const filesRes = await fetch('/api/files', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!filesRes.ok) {
                    showStatus(`❌ 获取文件列表失败: ${filesRes.status}`, 'error');
                    return;
                }

                const filesData = await filesRes.json();

                if (!filesData.files || filesData.files.length === 0) {
                    showStatus('❌ 没有文件', 'error');
                    return;
                }

                const file = filesData.files[0];
                showResult('文件信息', file);

                // 测试下载
                const downloadRes = await fetch(`/api/files/${file.file_id}/download`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                showResult('下载结果', {
                    status: downloadRes.status,
                    statusText: downloadRes.statusText,
                    contentType: downloadRes.headers.get('content-type'),
                    contentLength: downloadRes.headers.get('content-length'),
                    ok: downloadRes.ok
                });

                if (downloadRes.ok) {
                    showStatus('✓ 下载成功', 'success');
                } else {
                    const err = await downloadRes.json().catch(() => ({}));
                    showStatus(`❌ 下载失败: ${err.detail || downloadRes.statusText}`, 'error');
                }
            } catch (e) {
                showStatus(`❌ 请求失败: ${e.message}`, 'error');
            }
        }

        async function testDelete() {
            if (!token) {
                showStatus('❌ 未登录', 'error');
                return;
            }

            if (!confirm('确定要测试删除API吗？这会实际删除文件！')) {
                return;
            }

            showStatus('正在测试删除API...', 'info');

            try {
                // 获取文件
                const filesRes = await fetch('/api/files', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!filesRes.ok) {
                    showStatus(`❌ 获取文件列表失败: ${filesRes.status}`, 'error');
                    return;
                }

                const filesData = await filesRes.json();

                if (!filesData.files || filesData.files.length === 0) {
                    showStatus('❌ 没有文件可删除', 'error');
                    return;
                }

                const file = filesData.files[0];

                // 尝试删除
                const deleteRes = await fetch(`/api/files/${file.file_id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                showResult('删除结果', {
                    status: deleteRes.status,
                    statusText: deleteRes.statusText,
                    ok: deleteRes.ok,
                    response: deleteRes.ok ? await deleteRes.json() : await deleteRes.json().catch(() => ({}))
                });

                if (deleteRes.ok) {
                    showStatus('✓ 删除成功', 'success');
                    // 刷新文件列表
                    testDownload();
                } else {
                    const err = await deleteRes.json().catch(() => ({}));
                    showStatus(`❌ 删除失败: ${err.detail || deleteRes.statusText}`, 'error');
                }
            } catch (e) {
                showStatus(`❌ 请求失败: ${e.message}`, 'error');
            }
        }

        function clearAndReLogin() {
            if (confirm('确定要清除所有缓存并重新登录吗？')) {
                localStorage.clear();
                window.location.href = '/login';
            }
        }

        // 页面加载时自动检查
        window.onload = function() {
            if (!token) {
                showStatus('❌ 未登录 - 请先登录', 'error');
            } else {
                showStatus(`✓ 已登录 - 用户: ${username}`, 'success');
                testAuth();
            }
        };
    </script>
</body>
</html>
